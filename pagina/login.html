<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - LIBRE CONECT</title>
    <link rel="stylesheet" href="css/login.css">
</head>
<body>

    <main class="auth-container">
        <header class="auth-header">
            <h1>LIBRE CONECT</h1>
            <p>Ingresa a tu cuenta</p>
        </header>

        <form class="login-form">
            <div class="form-group">
                <label for="email">Correo electrónico</label>
                <input type="email" id="email" required>
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" required>
                <a href="#" class="forgot-password">¿Olvidaste tu contraseña?</a>
            </div>

            <button type="submit" class="btn-submit" formaction="home.html">Iniciar sesión</button>
        </form>

        <p class="register-link">
            ¿No tienes una cuenta? <a href="#">Regístrate</a>
        </p>
        <script>
        function login(){
            let u = document.getElementById("usuario").value;
            let c = document.getElementById("clave").value;
            let msg = document.getElementById("mensaje");

            if(u === "administador@unilibre.edu.co" && c === "12345678"){
                msg.innerHTML = "Bienvenido Admin";
                /*window.location.href = "pestaña.html";*/
                window.location.href = "home_admin";
            }
            else if(u === "usuario@unilibre.edu.co" && c === "87654321"){
                msg.innerHTML = "Bienvenido Usuario";
            /* window.location.href = "pestaña.html";*/
            window.location.href = "home.html";
            }
            else{
                msg.innerHTML = "Datos incorrectos";
            }
        }
        </script>

    </main>

</body>
</html>
